<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawboard Viewer</title>
    <link rel="stylesheet" href="css/viewer.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Drawboard Viewer</h1>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Connecting...</span>
            </div>
        </header>

        <!-- Auto-connecting section -->
        <div class="connection-section" id="connectionSection">
            <div class="card">
                <h2>Connecting to Drawboard</h2>
                <p id="connectionMessage">Establishing secure connection...</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="hint">This happens automatically - no manual steps needed!</p>
            </div>
        </div>

        <!-- Canvas Section (shown when connected) -->
        <div class="canvas-section" id="canvasSection" style="display: none;">
            <div class="canvas-controls">
                <button id="zoomInBtn" class="btn btn-icon" title="Zoom In">+</button>
                <button id="zoomOutBtn" class="btn btn-icon" title="Zoom Out">−</button>
                <button id="resetZoomBtn" class="btn btn-icon" title="Reset Zoom">⟲</button>
                <span class="zoom-level" id="zoomLevel">100%</span>
            </div>
            <div class="canvas-wrapper" id="canvasWrapper">
                <!-- Page content will be rendered here -->
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by <strong>Drawboard</strong> | Real-time WebRTC Sharing</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"
            integrity="sha512-XEKeWX+mI3Ov+tg2evDlVQFzVOIp4T8J3cNcCEPaEUGpxJV3eZaN8rHuvnFPvQpGJBHPmrozJDMpm2xcDvtmyQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="js/peerjs-client.js"></script>
    <script src="js/page-renderer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
