<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16">
  <!-- Selection rectangle (dashed) -->
  <rect x="4" y="4" width="14" height="14"
        fill="none"
        stroke="#2196F3"
        stroke-width="1.5"
        stroke-dasharray="2,2"/>

  <!-- Element fully inside (green = selected) -->
  <circle cx="9" cy="9" r="2.5"
          fill="#4CAF50"
          fill-opacity="0.5"
          stroke="#388E3C"
          stroke-width="1"/>

  <!-- Another element fully inside -->
  <rect x="11" y="11" width="5" height="5"
        fill="#4CAF50"
        fill-opacity="0.5"
        stroke="#388E3C"
        stroke-width="1"/>

  <!-- Element partially outside (gray = not selected) -->
  <circle cx="18" cy="11" r="3"
          fill="#9E9E9E"
          fill-opacity="0.3"
          stroke="#757575"
          stroke-width="1"
          stroke-dasharray="1,1"/>
</svg>
