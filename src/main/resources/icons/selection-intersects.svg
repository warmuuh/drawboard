<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16">
  <!-- Selection rectangle (dashed) -->
  <rect x="4" y="4" width="14" height="14"
        fill="none"
        stroke="#2196F3"
        stroke-width="1.5"
        stroke-dasharray="2,2"/>

  <!-- Partially overlapping element (showing intersect selection) -->
  <rect x="11" y="11" width="8" height="8"
        fill="#FF9800"
        fill-opacity="0.5"
        stroke="#F57C00"
        stroke-width="1"/>

  <!-- Element fully inside -->
  <circle cx="10" cy="10" r="3"
          fill="#4CAF50"
          fill-opacity="0.5"
          stroke="#388E3C"
          stroke-width="1"/>
</svg>
