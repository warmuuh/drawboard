<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16">
  <!-- Notebook binding -->
  <rect x="4" y="2" width="2" height="20" fill="#8B4513" rx="1"/>

  <!-- Notebook cover -->
  <rect x="6" y="2" width="14" height="20" fill="#4A90E2" stroke="#2E5C8A" stroke-width="0.5" rx="1"/>

  <!-- Pages effect (layered look) -->
  <rect x="7" y="3" width="12" height="18" fill="#F8F8F8" stroke="#D0D0D0" stroke-width="0.3"/>

  <!-- Horizontal lines on page -->
  <line x1="8" y1="7" x2="18" y2="7" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="8" y1="10" x2="18" y2="10" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="8" y1="13" x2="18" y2="13" stroke="#CCCCCC" stroke-width="0.5"/>
  <line x1="8" y1="16" x2="18" y2="16" stroke="#CCCCCC" stroke-width="0.5"/>
</svg>
