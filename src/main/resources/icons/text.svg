<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16">
  <!-- Letter "A" -->
  <path d="M8 20 L10 14 L12 8 L14 14 L16 20"
        fill="none"
        stroke="#333333"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Crossbar on A -->
  <line x1="9.5" y1="16" x2="14.5" y2="16"
        stroke="#333333"
        stroke-width="2"
        stroke-linecap="round"/>

  <!-- Text cursor (blinking line) -->
  <line x1="18" y1="8" x2="18" y2="20"
        stroke="#4A90E2"
        stroke-width="1.5"
        stroke-linecap="round"/>

  <!-- Cursor top cap -->
  <line x1="17" y1="8" x2="19" y2="8"
        stroke="#4A90E2"
        stroke-width="1.5"
        stroke-linecap="round"/>

  <!-- Cursor bottom cap -->
  <line x1="17" y1="20" x2="19" y2="20"
        stroke="#4A90E2"
        stroke-width="1.5"
        stroke-linecap="round"/>
</svg>
